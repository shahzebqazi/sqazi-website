<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content &mdash; sqazi.sh</title>
</head>
<body>

<header>
<h1>Willy Worst</h1>
</header>

<nav>
<a href="index.html">Home</a> /
<a href="links.html">Links</a> /
<a href="content.html?page=projects">Projects</a> /
<a href="content.html?page=papers">Papers</a> /
<a href="content.html?page=cv">CV</a> /
<a href="content.html?page=blog">Blog</a>
</nav>

<hr>

<main>
<h1 id="page-title">Loading...</h1>
<div id="page-content">Fetching content...</div>
</main>

<hr>

<footer>
</footer>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var page = params.get("page") || "projects";
  var allowed = ["projects", "papers", "cv", "blog"];

  var titleEl = document.getElementById("page-title");
  var contentEl = document.getElementById("page-content");

  if (allowed.indexOf(page) === -1) {
    titleEl.textContent = "404";
    contentEl.textContent = "Page not found. Use the navigation above.";
    contentEl.className = "page-content--plain";
    document.title = "404 — sqazi.sh";
    return;
  }

  var labels = { projects: "Projects", papers: "Papers", cv: "CV", blog: "Blog" };
  titleEl.textContent = labels[page] || page.charAt(0).toUpperCase() + page.slice(1);
  document.title = titleEl.textContent + " — sqazi.sh";

  if (page === "projects") {
    fetch("content/projects.html")
      .then(function (res) {
        if (!res.ok) throw new Error(res.status);
        return res.text();
      })
      .then(function (html) {
        var doc = new DOMParser().parseFromString(html, "text/html");
        var styleEl = doc.getElementById("projects-inline-style");
        if (styleEl && !document.getElementById("projects-inline-style")) {
          document.head.appendChild(styleEl);
        }
        var root = doc.querySelector(".projects-page");
        contentEl.className = "";
        if (root) {
          contentEl.innerHTML = "";
          contentEl.appendChild(document.importNode(root, true));
        } else {
          contentEl.className = "page-content--plain";
          contentEl.textContent = "Projects could not be loaded.";
        }
      })
      .catch(function () {
        contentEl.className = "page-content--plain";
        contentEl.textContent = "Projects could not be loaded. Check back later.";
      });
    return;
  }

  contentEl.className = "page-content--plain";
  fetch("content/" + page + ".txt")
    .then(function (res) {
      if (!res.ok) throw new Error(res.status);
      return res.text();
    })
    .then(function (text) {
      contentEl.textContent = text;
    })
    .catch(function () {
      contentEl.textContent = "Content not available yet. Check back later.";
    });
})();
</script>

<style>
.page-content--plain {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, monospace;
  font-size: 0.9rem;
  line-height: 1.45;
  margin: 0;
}
</style>

</body>
</html>
