<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content &mdash; sqazi.sh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<script>
(function(){var k="sqazi-theme",t;try{t=localStorage.getItem(k);}catch(e){}if(t!=="latte"&&t!=="mocha")t=matchMedia("(prefers-color-scheme:light)").matches?"latte":"mocha";document.documentElement.setAttribute("data-theme",t);})();
</script>
<link rel="stylesheet" href="assets/css/catppuccin.css">
<link rel="stylesheet" href="assets/css/site.css">
</head>
<body>

<header class="site-header">
<div class="site-header__inner">
<h1 class="site-brand"><a href="index.html">Willy Worst</a></h1>
<div class="site-header__bar">
<nav class="site-nav" id="site-nav" aria-label="Primary">
<a href="index.html" data-nav="home">Home</a>
<span class="site-nav__sep" aria-hidden="true">/</span>
<a href="content.html?page=projects" data-nav="projects">Projects</a>
<span class="site-nav__sep" aria-hidden="true">/</span>
<a href="content.html?page=cv" data-nav="cv">CV</a>
<span class="site-nav__sep" aria-hidden="true">/</span>
<a href="content.html?page=blog" data-nav="blog">Blog</a>
<span class="site-nav__sep" aria-hidden="true">/</span>
<a href="links.html" data-nav="links">Links</a>
</nav>
<button type="button" class="theme-toggle" id="theme-toggle">Latte</button>
</div>
</div>
</header>

<main class="site-main">
<h1 id="page-title">Loading...</h1>
<div id="page-content">Fetching content...</div>
</main>

<footer class="site-footer">
<div class="site-footer__inner">
<p><a href="mailto:code@sqazi.sh">code@sqazi.sh</a> · <a href="https://sqazi.sh">sqazi.sh</a> · <a href="content.html?page=cv">CV</a></p>
</div>
</footer>

<script src="assets/js/theme.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var page = params.get("page") || "projects";
  var allowed = ["projects", "papers", "cv", "blog"];

  var titleEl = document.getElementById("page-title");
  var contentEl = document.getElementById("page-content");
  var nav = document.getElementById("site-nav");

  if (nav && allowed.indexOf(page) !== -1) {
    var active = nav.querySelector('[data-nav="' + page + '"]');
    if (active) active.setAttribute("aria-current", "page");
  }

  if (allowed.indexOf(page) === -1) {
    titleEl.textContent = "404";
    contentEl.textContent = "Page not found. Use the navigation above.";
    contentEl.className = "page-content--plain";
    document.title = "404 — sqazi.sh";
    return;
  }

  var labels = { projects: "Projects", papers: "Papers", cv: "CV", blog: "Blog" };
  titleEl.textContent = labels[page] || page.charAt(0).toUpperCase() + page.slice(1);
  document.title = titleEl.textContent + " — sqazi.sh";

  if (page === "projects") {
    fetch("content/projects.html")
      .then(function (res) {
        if (!res.ok) throw new Error(res.status);
        return res.text();
      })
      .then(function (html) {
        var doc = new DOMParser().parseFromString(html, "text/html");
        var root = doc.querySelector(".projects-page");
        contentEl.className = "";
        if (root) {
          contentEl.innerHTML = "";
          contentEl.appendChild(document.importNode(root, true));
        } else {
          contentEl.className = "page-content--plain";
          contentEl.textContent = "Projects could not be loaded.";
        }
      })
      .catch(function () {
        contentEl.className = "page-content--plain";
        contentEl.textContent = "Projects could not be loaded. Check back later.";
      });
    return;
  }

  contentEl.className = "page-content--plain";
  fetch("content/" + page + ".txt")
    .then(function (res) {
      if (!res.ok) throw new Error(res.status);
      return res.text();
    })
    .then(function (text) {
      contentEl.textContent = text;
    })
    .catch(function () {
      contentEl.textContent = "Content not available yet. Check back later.";
    });
})();
</script>

</body>
</html>
